---
layout: blog-page
---
<article class="post">
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <p class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>
      {% if page.author %} &bull; {{ page.author }}{% endif %}
    </p>
    <p><a href="/blog">&larr; Back to Blog</a></p>
  </header>
  <div class="post-content">
    {{ content }}
  </div>


<div id="comments" class="comments">
  <script src="https://utteranc.es/client.js"
          repo="meirfi/mfinkels.dev"
          issue-term="pathname"
          theme="github-light"
          crossorigin="anonymous"
          async>
  </script>
</div>
</article>

<style>
  .post { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
  .post-header h1 { margin-bottom: 0.25rem; }
  .post-meta { color: #888; font-size: 0.9rem; margin-bottom: 1rem; }
  .post-content { line-height: 1.7; }
  .post-content h2, .post-content h3 { margin-top: 1.5rem; }
  .post-content code { background: #2a2a2a; padding: 0.2em 0.4em; border-radius: 3px; font-size: 0.9em; }
  .post-content pre { background: #2a2a2a; padding: 1rem; border-radius: 5px; overflow-x: auto; }
  .post-content pre code { background: none; padding: 0; }
</style>
