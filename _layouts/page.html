---
layout: blog-page
---
<article class="post">
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    {% if page.last_updated %}
    <p class="post-meta">Last updated: {{ page.last_updated }}</p>
    {% endif %}
    <p><a href="/">&larr; Back to Home</a></p>
  </header>
  <div class="post-content">
    {{ content }}
  </div>
</article>

<style>
  .post { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
  .post-header h1 { margin-bottom: 0.25rem; }
  .post-meta { color: #888; font-size: 0.9rem; margin-bottom: 1rem; }
  .post-content { line-height: 1.7; }
  .post-content h2 { margin-top: 2rem; padding-bottom: 0.3rem; border-bottom: 1px solid #333; }
  .post-content h3 { margin-top: 1.5rem; }
  .post-content table { width: 100%; border-collapse: collapse; margin: 1rem 0; font-size: 0.9rem; }
  .post-content th, .post-content td { border: 1px solid #444; padding: 0.5rem 0.75rem; text-align: left; }
  .post-content th { background: #2a2a2a; }
  .post-content ul { padding-left: 1.5rem; }
</style>
