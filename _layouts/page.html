<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">

{%- include head.html -%}

<body class="{% if site.darkmode == true and site.darkmode != 'never' %}dark{% endif %}">

  <div class="container page-nav-container">
    <div class="row">
      <div class="col-xs-12 page-nav">
        <a href="/" class="page-nav-back">&#8592; {{ site.name | escape }}</a>
      </div>
    </div>
  </div>

  <main class="page-content" aria-label="Content">
    <div class="wrapper">
      <article class="standalone-page">
        <header class="standalone-page-header">
          <h1>{{ page.title }}</h1>
          {% if page.last_updated %}<p class="page-meta">Last updated: {{ page.last_updated }}</p>{% endif %}
        </header>
        <div class="standalone-page-content">
          {{ content }}
        </div>
      </article>
    </div>
  </main>

  {%- include footer.html -%}

</body>

<style>
  .page-nav-container {
    padding: 1rem 1.5rem;
    border-bottom: 1px solid #333;
  }
  .page-nav-back {
    font-size: 0.9rem;
    color: #888;
    text-decoration: none;
  }
  .page-nav-back:hover {
    color: #fff;
  }
  .standalone-page {
    max-width: 800px;
    margin: 2rem auto;
    padding: 0 1rem;
  }
  .standalone-page-header h1 { margin-bottom: 0.25rem; }
  .page-meta { color: #888; font-size: 0.9rem; margin-bottom: 1rem; }
  .standalone-page-content { line-height: 1.7; }
  .standalone-page-content h2 { margin-top: 2rem; padding-bottom: 0.3rem; border-bottom: 1px solid #333; }
  .standalone-page-content h3 { margin-top: 1.5rem; }
  .standalone-page-content table { width: 100%; border-collapse: collapse; margin: 1rem 0; font-size: 0.9rem; }
  .standalone-page-content th,
  .standalone-page-content td { border: 1px solid #444; padding: 0.5rem 0.75rem; text-align: left; }
  .standalone-page-content th { background: #2a2a2a; }
  .standalone-page-content ul { padding-left: 1.5rem; }
</style>

</html>
