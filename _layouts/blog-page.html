<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
{%- include blog-head.html -%}
<body>

  <nav class="blog-topbar">
    <a href="/" class="topbar-back">&#8592; {{ site.name | escape }}</a>
    <span class="topbar-label">Blog</span>
  </nav>

  <main class="blog-main" aria-label="Content">
    {{ content }}
  </main>

  <footer class="blog-footer">
    &copy; {{ 'now' | date: "%Y" }} {{ site.name | escape }} &mdash;
    <a href="/">Home</a> &middot; <a href="/blog/">Blog</a>
  </footer>

</body>
</html>
