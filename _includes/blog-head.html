<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.name | escape }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}">
  {% if site.favicon %}<link rel="icon" href="{{ site.favicon | relative_url }}">{% endif %}

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #1a1b26;
      --bg-alt:     #1f2335;
      --border:     #2f3549;
      --text:       #c0caf5;
      --text-muted: #565f89;
      --heading:    #cdd6f4;
      --link:       #7aa2f7;
      --code-bg:    #1f2335;
      --accent:     #7aa2f7;
      --font-sans:  'Inter', system-ui, -apple-system, sans-serif;
      --font-mono:  'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.75;
      font-size: 1rem;
      -webkit-font-smoothing: antialiased;
    }

    /* Topbar */
    .blog-topbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(26,27,38,0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .topbar-back {
      font-size: 0.85rem; color: var(--text-muted);
      text-decoration: none; display: flex; align-items: center; gap: 0.35rem;
      transition: color 0.15s;
    }
    .topbar-back:hover { color: var(--link); }
    .topbar-label {
      font-size: 0.8rem; font-weight: 600; color: var(--text-muted);
      letter-spacing: 0.08em; text-transform: uppercase;
    }

    /* Layout */
    .blog-main { max-width: 760px; margin: 0 auto; padding: 2.5rem 1.5rem 5rem; }

    /* Blog index */
    .blog-index-header { margin-bottom: 2.5rem; }
    .blog-index-header h1 {
      font-size: 2rem; font-weight: 700; color: var(--heading);
      letter-spacing: -0.02em; margin-bottom: 0.4rem;
    }
    .blog-index-header p { color: var(--text-muted); font-size: 0.95rem; }
    .post-list { list-style: none; padding: 0; }
    .post-list-item { padding: 1.75rem 0; border-bottom: 1px solid var(--border); }
    .post-list-item:first-child { padding-top: 0; }
    .post-list-item h2 { font-size: 1.15rem; font-weight: 600; margin-bottom: 0.35rem; letter-spacing: -0.01em; }
    .post-list-item h2 a { color: var(--heading); text-decoration: none; transition: color 0.15s; }
    .post-list-item h2 a:hover { color: var(--link); }
    .post-list-meta { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem; }
    .post-list-excerpt { font-size: 0.9rem; color: var(--text-muted); line-height: 1.6; }

    /* Post header */
    .post-header { margin-bottom: 2rem; }
    .post-header h1 {
      font-size: 2rem; font-weight: 700; color: var(--heading);
      line-height: 1.3; letter-spacing: -0.02em; margin-bottom: 0.75rem;
    }
    .post-meta { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.75rem; }
    .post-back {
      display: inline-flex; align-items: center; gap: 0.3rem;
      font-size: 0.85rem; color: var(--text-muted); text-decoration: none; transition: color 0.15s;
    }
    .post-back:hover { color: var(--link); }
    .post-divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0 2.5rem; }

    /* Post content */
    .post-content { line-height: 1.85; }
    .post-content h2 {
      font-size: 1.45rem; font-weight: 600; color: var(--heading);
      margin: 2.5rem 0 1rem; padding-bottom: 0.4rem;
      border-bottom: 1px solid var(--border); letter-spacing: -0.01em;
    }
    .post-content h3 { font-size: 1.15rem; font-weight: 600; color: var(--heading); margin: 2rem 0 0.75rem; }
    .post-content h4 { font-size: 1rem; font-weight: 600; color: var(--heading); margin: 1.5rem 0 0.5rem; }
    .post-content p { margin-bottom: 1.25rem; }
    .post-content a { color: var(--link); text-decoration: underline; text-decoration-color: transparent; transition: text-decoration-color 0.15s; }
    .post-content a:hover { text-decoration-color: var(--link); }
    .post-content strong { color: var(--heading); font-weight: 600; }
    .post-content ul, .post-content ol { padding-left: 1.75rem; margin-bottom: 1.25rem; }
    .post-content li { margin-bottom: 0.35rem; }
    .post-content hr { border: none; border-top: 1px solid var(--border); margin: 2.5rem 0; }
    .post-content blockquote {
      border-left: 3px solid var(--accent); margin: 1.5rem 0;
      padding: 0.75rem 1.25rem; background: var(--bg-alt);
      border-radius: 0 6px 6px 0; color: var(--text-muted); font-style: italic;
    }
    .post-content code {
      font-family: var(--font-mono); font-size: 0.85em;
      background: var(--code-bg); color: #e2e8f0;
      padding: 0.15em 0.45em; border-radius: 4px; border: 1px solid var(--border);
    }
    .post-content pre {
      font-family: var(--font-mono); background: var(--code-bg);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 1.25rem 1.5rem; overflow-x: auto; margin-bottom: 1.5rem;
      font-size: 0.875rem; line-height: 1.7;
    }
    .post-content pre code { background: none; padding: 0; border: none; font-size: inherit; color: #a9b1d6; }
    .post-content table { width: 100%; border-collapse: collapse; margin: 1.5rem 0; font-size: 0.9rem; }
    .post-content th {
      background: var(--bg-alt); color: var(--heading); font-weight: 600;
      padding: 0.6rem 1rem; text-align: left; border: 1px solid var(--border);
    }
    .post-content td { padding: 0.6rem 1rem; border: 1px solid var(--border); }
    .post-content tr:nth-child(even) td { background: var(--bg-alt); }

    /* Comments */
    .comments { margin-top: 3rem; padding-top: 2rem; border-top: 1px solid var(--border); }

    /* Footer */
    .blog-footer {
      border-top: 1px solid var(--border); padding: 1.5rem;
      text-align: center; font-size: 0.8rem; color: var(--text-muted);
    }
    .blog-footer a { color: var(--text-muted); text-decoration: none; }
    .blog-footer a:hover { color: var(--link); }

    @media (max-width: 640px) {
      .post-header h1, .blog-index-header h1 { font-size: 1.6rem; }
      .blog-main { padding: 1.5rem 1rem 3rem; }
      .blog-topbar { padding: 0.65rem 1rem; }
    }
  </style>
</head>
